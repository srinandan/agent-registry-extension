name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create a GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Inject version into files
        run: |
          TAG="${{ github.ref_name }}"
          SHA="${{ steps.vars.outputs.sha }}"
          VERSION="${TAG}+${SHA}"

          # Update SKILL.md
          sed -i "s/version: \".*\"/version: \"${VERSION}\"/" skills/agent-registry/SKILL.md

          # Update gemini-extension.json
          jq ".version = \"${VERSION}\"" gemini-extension.json > tmp.json && mv tmp.json gemini-extension.json

          echo "Injected version: ${VERSION}"

      - name: Create release archives
        run: |
          mkdir -p release

          # Package all files in the repository EXCEPT for .git, .github, and the release folder itself
          tar --exclude='./.git' --exclude='./.github' --exclude='./release' -czvf release/agent-registry.tar.gz .
          zip -r release/agent-registry.zip . -x "*.git*" "*.github*" "*release*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/agent-registry.tar.gz
            release/agent-registry.zip
          generate_release_notes: true
